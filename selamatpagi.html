<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+KR|Noto+Serif+KR&display=swap" rel="stylesheet">
    <style>
    body {
        line-height: 100%;
        display: float;
    }
    .sentence {
        font-family: 'Noto Serif KR', serif;
        font-size: 64px;
        font-weight: bold;
        line-height: 0;
        text-align: center;
    }
    .translation {
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 26px;
        font-weight: normal;
        text-align: center;
    }
    .word {
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 32px;
        font-weight: bold;
    }
    .description {
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 32px;
        font-weight: normal;
        margin-left: 32px;
    }
    div.container {
        overflow: hidden;
        position: relative;
    }
    div.block {
        display: inline-block;
        margin-right: 32px;
    }
    </style>
</head>
<body>
    <div class= "block">
        <p class= "sentence">슬라맛 빠기</p>
        <p class= "translation">[인니어로 안녕, 좋은 아침]</p>
        <p class= "word">슬라맛 (selamat)</p>
        <p class= "description">1. 안전한, 건강한;<br /><br />
            2. 목적에 이른, 성공한</p>
        <p class= "word">빠기 (pagi)</p>
        <p class= "description">1. 아침<br /><br />2. 이른, 빠른</p>
    </div>
    <div class= "block">
            <p class= "sentence">야, 사야 비사</p>
            <p class= "translation">[인니어로 Yes, I can]</p>
            <p class= "word">야 (ya)</p>
            <p class= "description">1. 예!; 2. 오!
            <p class= "word">사야 (saya)</p>
            <p class= "description">1. 나; 2. 나를; 3. 나의</p>
            <p class= "word">비사 (bisa)</p>
            <p class= "description">1. ~할 수 있는</p>    
    </div>
</body>
</html>
